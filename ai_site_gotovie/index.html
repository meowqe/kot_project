<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Serendale - Fast Blockchain & Scalable AI</title>
    
    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css?family=Chillax&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Clash+Grotesk&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Cabinet+Grotesk&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Space+Grotesk&display=swap" rel="stylesheet" />
    
    <!-- Font Awesome для иконок соцсетей -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
    <div class="main-container">
        <!-- Декоративный фон (небо/градиенты) -->
        <div class="background-decor">
            <div class="circle circle-pink"></div>
            <div class="circle circle-purple"></div>
            <div class="circle circle-blue"></div>
        </div>

        <!-- Хедер с навигацией -->
        <header class="header">
            <a href="#" class="logo">Serendale</a>
            <nav class="nav">
                <a href="#">Services</a>
                <a href="#">Smart Contracts</a>
                <a href="#">Solutions</a>
                <a href="#">Roadmap</a>
                <a href="#">Whitepaper</a>
            </nav>
            <div class="social-icons">
                <!-- Twitter/X -->
                <a href="#" class="icon" aria-label="Twitter" title="Twitter">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
                <!-- Discord -->
                <a href="#" class="icon" aria-label="Discord" title="Discord">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <!-- Telegram -->
                <a href="#" class="icon" aria-label="Telegram" title="Telegram">
                    <i class="fa-brands fa-telegram"></i>
                </a>
                <!-- GitHub -->
                <a href="#" class="icon" aria-label="GitHub" title="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </header>

        <!-- Основной контент -->
        <main class="hero">
            <h1 class="hero-title">
                <span class="gradient-text">A Fast Blockchain.</span><br>
                <span class="white-text">Scalable AI.</span>
            </h1>
            <p class="hero-description">
                Our technology performing fast blockchain (120K TPS) and it has guaranteed AI-based data security. Proof of Stake, its consensus algorithm enables unlimited speeds.
            </p>
            <div class="cta-buttons">
                <a href="#" class="btn btn-primary">Get started</a>
                <a href="#" class="btn btn-secondary">Ecosystems</a>
            </div>
        </main>

        <!-- Нижний декоративный блок (изображение) БЕЗ ОБРЕЗКИ -->
        <div class="bottom-image">
            <img src="images/v3_107.png" alt="Decorative blockchain visual" />
        </div>
    </div>
</body>
</html>
